<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HSC 2027 Study Hub | বাংলা ভার্সন</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="appContainer" class="app-container">
    <div class="dashboard-header">
      <div class="logo-area">
        <h1><i class="fas fa-graduation-cap"></i> HSC 2027 Study Hub</h1>
        <span>বাংলা ভার্সন | যারা চেষ্টা করে, আল্লাহ তাদের পথ দেখান</span>
      </div>
    </div>

    <!-- Global Progress Bar (appears when a subject is selected) -->
    <div id="globalProgress" class="progress-container" style="display: none;">
      <div class="progress-bar" id="progress-bar"></div>
      <p id="progress-text">📊 অগ্রগতি: 0%</p>
    </div>

    <!-- Main Dashboard (Subject Cards) -->
    <div id="dashboardMain">
      <div class="options-grid" id="subjectsGrid"></div>
    </div>

    <!-- Dynamic Content Area (chapters, video player) -->
    <div id="contentArea" class="section-view"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
